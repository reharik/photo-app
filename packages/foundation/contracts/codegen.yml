schema: ../../../apps/api/src/graphql/generated/schema.graphql
generates:
  ./src/enums/graphqlSmartEnums.ts:
    preset: '@reharik/graphql-codegen-smart-enum-preset'
    presetConfig:
      mode: enums
      serializeAs: value
      emitDescriptionsAsDisplay: true
      # Hand-authored in src/enums/operations.ts (deniedError, etc.)
      skipEnums:
        - Operation
        - AlbumMemberRole
        - ReactionEmoji
        - ErrorCategory
      externalEnums:
        Operation: './operation'
        AlbumMemberRole: './albumMemberRole'
        ReactionEmoji: './reactionEmojis'
        ErrorCategory: './ContractError'
