schema: ../../../apps/api/src/graphql/generated/schema.graphql
generates:
  ./src/enums/graphqlSmartEnums.ts:
    plugins:
      - '@reharik/graphql-codegen-smart-enum'
    config:
      emitDescriptionsAsDisplay: true
      # Hand-authored in src/enums/viewerOperations.ts (deniedError, etc.)
      skipEnums:
        - ViewerOperation
        - AlbumMemberRole
