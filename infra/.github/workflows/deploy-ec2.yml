name: Deploy

on:
  push:
    branches: [main]
    workflow_call:
      inputs:
        deploy_backend:
          type: boolean
          required: false
          default: true
        deploy_frontend:
          type: boolean
          required: false
          default: true
      secrets: inherit
permissions:
  contents: read
  id-token: write
jobs:
  deploy:
    uses: reharik/cannibal-infra/.github/workflows/deploy-ec2.yml@main
    with:
      # Push: deploy both. Dispatch: honor checkboxes (avoid `&& x || true` which forces true when x is false).
      deploy_backend: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_backend }}
      deploy_frontend: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_frontend }}
    secrets: inherit

  # bump
