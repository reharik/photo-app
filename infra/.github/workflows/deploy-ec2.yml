name: Deploy EC2

on:
  workflow_call:
    inputs:
      deploy_backend:
        required: false
        type: boolean
        default: true
      app_config_path:
        required: false
        type: string
        default: infra.app.config.json
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  discover:
    if: ${{ inputs.deploy_backend }}
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.discover.outputs.app_name }}
      aws_region: ${{ steps.discover.outputs.aws_region }}
      s3_bucket: ${{ steps.discover.outputs.s3_bucket }}
      env_name: ${{ steps.discover.outputs.env_name }}
      build_matrix: ${{ steps.discover.outputs.build_matrix }}
      changed_service_names: ${{ steps.discover.outputs.changed_service_names }}
    steps:
      - uses: actions/checkout@v4

      - id: load_config
        shell: bash
        run: |
          set -euo pipefail
          chmod +x infra/scripts/deploy/load-infra-app-config.sh
          infra/scripts/deploy/load-infra-app-config.sh "${{ inputs.app_config_path }}" > /tmp/infra.env
          cat /tmp/infra.env
          set -a
          source /tmp/infra.env
          set +a

          {
            echo "APP_NAME=$APP_NAME"
            echo "ENV_NAME=$ENV_NAME"
            echo "AWS_REGION=$AWS_REGION"
            echo "S3_BUCKET=$S3_BUCKET"
            echo "DOCKER_APP_WORKSPACE_PATH=$DOCKER_APP_WORKSPACE_PATH"
            echo "DOCKER_WORKERS_JSON=$DOCKER_WORKERS_JSON"
            echo "DOCKER_NODE_VERSION=$DOCKER_NODE_VERSION"
          } >> "$GITHUB_ENV"

      - id: discover
        shell: bash
        run: |
          set -euo pipefail

          BUILD_MATRIX="$(
            jq -cn \
              --arg apiPath "${DOCKER_APP_WORKSPACE_PATH}" \
              --arg workersJson "${DOCKER_WORKERS_JSON}" '
                [
                  { "name": "api", "workspacePath": $apiPath }
                ] + ($workersJson | fromjson | map({
                  "name": .name,
                  "workspacePath": .workspacePath
                }))
              '
          )"

          CHANGED_SERVICE_NAMES="$(jq -r '.[].name' <<<"$BUILD_MATRIX" | paste -sd ' ' -)"

          echo "app_name=${APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "aws_region=${AWS_REGION}" >> "$GITHUB_OUTPUT"
          echo "s3_bucket=${S3_BUCKET}" >> "$GITHUB_OUTPUT"
          echo "env_name=${ENV_NAME}" >> "$GITHUB_OUTPUT"
          echo "build_matrix=${BUILD_MATRIX}" >> "$GITHUB_OUTPUT"
          echo "changed_service_names=${CHANGED_SERVICE_NAMES}" >> "$GITHUB_OUTPUT"

      - name: Generate worker compose overlay
        shell: bash
        run: |
          set -euo pipefail
          chmod +x infra/scripts/deploy/generate-prod-workers-compose.sh
          infra/scripts/deploy/generate-prod-workers-compose.sh "${{ inputs.app_config_path }}" "${{ github.sha }}" > workers.generated.yml

      - uses: actions/upload-artifact@v4
        with:
          name: generated-worker-compose
          path: workers.generated.yml

  build:
    if: ${{ inputs.deploy_backend }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.discover.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - id: load_config
        shell: bash
        run: |
          set -euo pipefail
          chmod +x infra/scripts/deploy/load-infra-app-config.sh
          infra/scripts/deploy/load-infra-app-config.sh "${{ inputs.app_config_path }}" > /tmp/infra.env
          set -a
          source /tmp/infra.env
          set +a

          {
            echo "APP_NAME=$APP_NAME"
            echo "DOCKER_NODE_VERSION=$DOCKER_NODE_VERSION"
          } >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for ARM64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api/Dockerfile
          target: production
          platforms: linux/arm64
          build-args: |
            NODE_VERSION=${{ env.DOCKER_NODE_VERSION }}
            APP_WORKSPACE_PATH=${{ matrix.service.workspacePath }}
          tags: ${{ env.APP_NAME }}-${{ matrix.service.name }}:${{ github.sha }}
          load: true
          provenance: false
      - name: Save image tarball
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          docker save "${APP_NAME}-${{ matrix.service.name }}:${{ github.sha }}" | gzip > "out/${{ matrix.service.name }}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.service.name }}
          path: out/${{ matrix.service.name }}.tar.gz

  deploy:
    if: ${{ inputs.deploy_backend }}
    needs:
      - discover
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-Deploy-Backend
          aws-region: ${{ needs.discover.outputs.aws_region }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Prepare deploy payload
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p deploy-payload/compose
          cp infra/config/docker-compose/base.yml deploy-payload/compose/base.yml
          cp infra/config/docker-compose/prod.yml deploy-payload/compose/prod.yml
          cp artifacts/generated-worker-compose/workers.generated.yml deploy-payload/compose/workers.generated.yml
          find artifacts -name '*.tar.gz' -exec cp {} deploy-payload/ \;

      - name: Upload deploy payload to S3
        shell: bash
        run: |
          set -euo pipefail

          aws s3 cp deploy-payload/ \
            "s3://${{ needs.discover.outputs.s3_bucket }}/deployments/${{ needs.discover.outputs.app_name }}/${{ github.sha }}/" \
            --recursive \
            --region "${{ needs.discover.outputs.aws_region }}"

      - name: Run remote backend deploy via SSM
        shell: bash
        run: |
          set -euo pipefail
          chmod +x infra/scripts/deploy/ssm-run.sh

          export AWS_REGION="${{ needs.discover.outputs.aws_region }}"
          export S3_BUCKET="${{ needs.discover.outputs.s3_bucket }}"
          export APP_NAME="${{ needs.discover.outputs.app_name }}"
          export ENV="${{ needs.discover.outputs.env_name }}"
          export SHA="${{ github.sha }}"
          export DEPLOY_BACKEND=true
          export DEPLOY_FRONTEND=false
          export CHANGED_SERVICE_NAMES="${{ needs.discover.outputs.changed_service_names }}"
          export GITHUB_SHA="${{ github.sha }}"
          export GITHUB_RUN_ID="${{ github.run_id }}"
          export GITHUB_RUN_ATTEMPT="${{ github.run_attempt }}"

          source infra/scripts/deploy/ssm-run.sh
          ssm_run "Deploy backend ${APP_NAME} ${SHA}" "infra/scripts/remote/remote-deploy.sh"
