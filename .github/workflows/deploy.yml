name: Deploy

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      deploy_backend:
        description: Deploy backend containers
        type: boolean
        default: true
      deploy_frontend:
        description: Deploy frontend
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: reharik/cannibal-infra/.github/workflows/deploy-ec2.yml@main
    with:
      deploy_backend: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_backend }}
      deploy_frontend: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_frontend }}
      app_config_path: infra.app.config.json
    secrets: inherit