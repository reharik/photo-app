name: Deploy

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      deploy_backend:
        description: Deploy backend containers
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: reharik/cannibal-infra/.github/workflows/deploy-ec2.yml@main
    with:
      deploy_backend: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_backend }}
      app_config_path: infra.app.config.json
      remote_app_dir: /opt/photo-app
      ssh_user: ubuntu
      env_name: prod
    secrets:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}