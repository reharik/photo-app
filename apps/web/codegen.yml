schema: ../api/src/graphql/generated/schema.graphql
documents:
  - 'src/graphql/**/*.graphql'
generates:
  src/graphql/generated/types.ts:
    preset: '@reharik/graphql-codegen-smart-enum-preset'
    presetConfig:
      mode: with-enum-values
      enumImportPath: '@packages/contracts'
    plugins:
      - typescript
      - typescript-operations
      - typed-document-node
    config:
      scalars:
        DateTime:
          input: string
          output: string
        Date: string
        UUID: string
        JSON: unknown # or whatever you actually want for JSON
      maybeValue: 'T | undefined'
      avoidOptionals:
        field: false # nullable fields become optional `field?:`
        inputValue: false
        object: false
        defaultValue: false
      skipTypename: true
      nonOptionalTypename: false
      enumsAsTypes: true
      inputMaybeValue: 'T | undefined'
      namingConvention:
        typeNames: pascal-case#pascalCase

  ./src/graphql/generated/graphql-smart-enum-type-policies.ts:
    preset: '@reharik/graphql-codegen-smart-enum-preset'
    presetConfig:
      mode: type-policies
      enumImportPath: '@packages/contracts'
