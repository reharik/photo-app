schema: ../api/src/graphql/generated/schema.graphql
documents:
  - 'src/graphql/**/*.graphql'
generates:
  src/graphql/generated/types.ts:
    preset: '@reharik/graphql-codegen-smart-enum-preset'
    presetConfig:
      mode: with-enum-values
      enumImportPath: '@packages/contracts'
    plugins:
      - typescript
      - typescript-operations
      - typed-document-node
    config:
      skipTypename: false
      enumsAsTypes: true
      constEnums: false
      maybeValue: 'T | undefined'
      inputMaybeValue: 'T | undefined'
      scalars:
        DateTime:
          input: string
          output: string
        Date: string
      namingConvention:
        typeNames: pascal-case#pascalCase

  ./src/graphql/generated/graphql-smart-enum-type-policies.ts:
    preset: '@reharik/graphql-codegen-smart-enum-preset'
    presetConfig:
      mode: type-policies
      enumImportPath: '@packages/contracts'
