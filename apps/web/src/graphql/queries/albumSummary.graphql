fragment AlbumSummary on Album {
  id
  title
  createdAt
  updatedAt
  itemCount
  owner {
    firstName
    lastName
  }
  ...ViewableAlbum
  coverMedia {
    ...MediaItemSummary
  }
}

fragment AlbumSummaryWithItems on Album {
  ...AlbumSummary
  items(input: { collectionInfo: $collectionInfo }) {
    nodes {
      ...AlbumItemSummary
    }
    pageInfo {
      limit
      offset
    }
    totalCount
  }
}
