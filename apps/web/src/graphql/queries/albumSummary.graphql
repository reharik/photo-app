fragment AlbumSummary on Album {
  id
  title
  createdAt
  updatedAt
  viewerOperations
  viewerMemberRole
  coverMedia {
    ...MediaItemSummary
  }
  items(
    input: {
      collectionInfo: { pageInfo: { limit: 100, offset: 0 }, sortBy: CREATED_AT, sortDir: DESC }
    }
  ) {
    nodes {
      ...AlbumItemSummary
    }
    pageInfo {
      limit
      offset
    }
  }
}
