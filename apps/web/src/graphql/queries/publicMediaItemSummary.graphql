fragment PublicMediaItemSummary on PublicMediaItem {
  id
  kind
  title
  mimeType
  width
  height
  durationSeconds
  reactionCounts {
    total
    byEmoji {
      emoji
      count
    }
  }
  comments(input: { collectionInfo: { pageInfo: { limit: 1, offset: 0 } } }) {
    totalCount
  }
  operations
}
