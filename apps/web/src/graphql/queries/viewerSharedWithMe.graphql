query ViewerSharedWithMe {
  viewer {
    id
    sharedWithMe {
      mediaItems {
        ...SharedMediaItem
      }
      albums {
        ...SharedAlbum
      }
    }
  }
}

fragment SharedMediaItem on SharedMediaItemType {
  id
  permission
  sharedAt
  sharedBy
  mediaItem {
    ...MediaItemSummary
  }
}

fragment SharedAlbum on SharedAlbumType {
  id
  permission
  sharedAt
  sharedBy
  album {
    ...AlbumSummary
  }
}
