query ViewerSharedWithMedMediaItems {
  viewer {
    id
    sharedWithMeMediaItems {
      ...SharedWithMedMediaItem
    }
  }
}

fragment SharedWithMedMediaItem on SharedWithMedMediaItemType {
  id
  sharedAt
  sharedBy
  viewerIsOwner
  viewerOperations
  mediaItem {
    ...MediaItemSummary
  }
}
