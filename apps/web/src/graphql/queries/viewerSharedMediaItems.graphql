query ViewerSharedWithMedMediaItems($collectionInfo: SharedWithMeMediaItemCollectionInput!) {
  viewer {
    id
    sharedWithMeMediaItems(input: { collectionInfo: $collectionInfo }) {
      nodes {
        ...SharedWithMedMediaItem
      }
      pageInfo {
        limit
        offset
      }
      totalCount
    }
  }
}

fragment SharedWithMedMediaItem on SharedWithMedMediaItemType {
  id
  sharedAt
  sharedBy
  mediaItem {
    ...MediaItemSummary
  }
}
