fragment CommentFields on Comment {
  id
  targetType
  targetId
  parentCommentId
  authorId
  body
  displayName
  displayAvatarUrl
  isEdited
  isDeleted
  reactionCounts {
    ...ReactionCounts
  }
  viewerReactions {
    ...ViewerReaction
  }
  createdAt
  updatedAt
}

# CHANGED: Fragments — name by what they return, not the UI surface that consumes them.
# Was CommentThreadFields (named after CommentThread component); renamed to CommentDetailFields.
fragment CommentDetailFields on Comment {
  ...CommentFields
  replies {
    ...CommentFields
  }
}

# Count-only slice for useFragment subscriptions on MediaItem — limit/offset literals
# are arbitrary; MediaItem.comments uses keyArgs: false so totalCount shares one slot.
fragment MediaItemCommentCount on MediaItem {
  comments(input: { collectionInfo: { pageInfo: { limit: 1, offset: 0 } } }) {
    totalCount
  }
}

query CommentsForViewerMediaItem($mediaItemId: ID!, $limit: Int!, $offset: Int!) {
  viewer {
    id
    mediaItem(id: $mediaItemId) {
      id
      comments(input: { collectionInfo: { pageInfo: { limit: $limit, offset: $offset } } }) {
        nodes {
          ...CommentDetailFields
        }
        totalCount
        pageInfo {
          limit
          offset
        }
      }
    }
  }
}

