fragment ReactionCounts on ReactionCounts {
  total
  byEmoji {
    ...ReactionDetails
  }
}

fragment ReactionDetails on ReactionDetails {
  emoji
  count
  reactors {
    ...Reactor
  }
}

fragment Reactor on Reactor {
  userId
  firstName
  lastName
  isViewer
}

fragment ViewerReaction on ViewerReaction {
  emoji
  id
}
