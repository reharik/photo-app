query ViewerSharedWithMeAlbums {
  viewer {
    id
    sharedWithMeAlbums(
      input: {
        collectionInfo: { pageInfo: { limit: 50, offset: 0 }, sortBy: SHARED_AT, sortDir: DESC }
      }
    ) {
      nodes {
        id
        sharedAt
        sharedBy
        sharedByFirstName
        sharedByLastName
        album {
          ...AlbumSummary
        }
      }
      pageInfo {
        limit
        offset
      }
      totalCount
    }
  }
}
