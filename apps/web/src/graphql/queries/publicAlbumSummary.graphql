fragment publicAlbumSummary on PublicAlbum {
  id
  title
  itemCount
  coverMedia {
    ...PublicMediaItemSummary
  }
  operations
  items(input: { collectionInfo: $collectionInfo }) {
    nodes {
      ...PublicAlbumItemSummary
    }
    pageInfo {
      limit
      offset
    }
    totalCount
  }
}
