mutation CreatePublicLinkForAlbum($input: CreatePublicLinkForAlbumInput!) {
  createPublicLinkForAlbum(input: $input) {
    success
    data {
      token
    }
    errors {
      code
      message
      field
      category
      retryable
    }
  }
}

