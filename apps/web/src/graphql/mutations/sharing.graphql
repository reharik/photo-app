mutation GrantMediaItemShare($input: GrantMediaItemShareInput!) {
  grantMediaItemShare(input: $input) {
    success
    token
    share {
      id
      grantedToUserId
      permission
      label
      expiresAt
      createdAt
    }
    errors {
      code
      message
      field
      category
      retryable
    }
  }
}

mutation GrantManyMediaItemShares($input: GrantManyMediaItemSharesInput!) {
