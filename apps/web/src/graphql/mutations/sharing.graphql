mutation grantUserAuthorizationsForMediaItems($input: GrantUserAuthorizationsForMediaItemsInput!) {
  grantUserAuthorizationsForMediaItems(input: $input) {
    data {
      authorizationIds
    }
    errors {
      ...errorsFragment
    }
  }
}

mutation GrantUserAuthorizationForAlbum($input: GrantUserAuthorizationForAlbumInput!) {
  grantUserAuthorizationForAlbum(input: $input) {
    data {
      authorizationIds
    }
    errors {
      ...errorsFragment
    }
  }
}

mutation DeleteShareContact($handle: String!) {
  deleteShareContact(handle: $handle) {
    data {
      handle
    }
    errors {
      ...errorsFragment
    }
  }
}
