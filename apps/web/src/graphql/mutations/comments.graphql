# CHANGED: Fragments — use CommentDetailFields (entity-named) instead of CommentThreadFields (surface-named).
mutation AddComment($input: AddCommentInput!) {
  addComment(input: $input) {
    data {
      comment {
        ...CommentDetailFields
      }
    }
    errors {
      ...errorsFragment
    }
  }
}

mutation EditComment($input: EditCommentInput!) {
  editComment(input: $input) {
    data {
      comment {
        ...CommentFields
      }
    }
    errors {
      ...errorsFragment
    }
  }
}

mutation DeleteComment($input: DeleteCommentInput!) {
  deleteComment(input: $input) {
    data {
      comment {
        ...CommentFields
      }
    }
    errors {
      ...errorsFragment
    }
  }
}
