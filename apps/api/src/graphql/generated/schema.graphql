  errors: [ContractError!]
}

input UpdateMediaItemTagsInput {
  mediaItemId: ID!
  tags: [String!]!
}

type UpdateMediaItemTagsPayload {
  mediaItemId: ID!
  tags: [String!]!
}

type UpdateMediaItemTagsResponse {
  data: UpdateMediaItemTagsPayload
  errors: [ContractError!]
}

type UploadHeader {
  key: String!
  value: String!
}

type UploadInstructions {
  headers: [UploadHeader!]!
  method: String!
  url: String!
}

type Viewer {
  album(id: ID!): Album
  albums(input: ViewerAlbumsInput!): AlbumCollectionPayload!
  deleteAlbum(input: DeleteAlbumInput!): DeleteAlbumResponse!
  displayName: String!
  firstName: String
  id: ID!
  lastName: String
  mediaItem(id: ID!): MediaItem
  mediaItems(input: ViewerMediaItemsInput!): MediaItemCollectionPayload!
}

input ViewerAlbumItemsInput {
  collectionInfo: AlbumItemCollectionInput!
}

input ViewerAlbumsInput {
  collectionInfo: AlbumCollectionInput!
}

input ViewerMediaItemsInput {
  collectionInfo: MediaItemCollectionInput!
}
