"""
Optional metadata on enum values for SmartEnum / codegen (e.g. DB column names).
"""
input EnumMetaPropInput {
  name: String!
  value: String!
}

enum ErrorCategory {
  AUTH
  CONFLICT
  DOMAIN
  NETWORK
  SYSTEM
  VALIDATION
}

input FinalizeMediaUploadInput {
  mediaItemId: ID!
}

type FinalizeMediaUploadPayload {
  kind: MediaKind!
  mediaItemId: ID!
  mimeType: String
  size: Int!
  status: MediaItemStatus!
}

type FinalizeMediaUploadResponse {
  data: FinalizeMediaUploadPayload
  errors: [ContractError!]
}

input GrantAlbumShareInput {
  albumId: ID!
  expiresAt: DateTime
  grantedToHandle: String
  grantedToUserId: ID
  label: String
  permission: SharePermission!
  token: String
}

input GrantMediaItemShareInput {
  expiresAt: DateTime
  grantedToHandle: String
  grantedToUserId: ID
  label: String
  mediaItemId: ID!
  permission: SharePermission!
  token: String
}

type GrantSharePayload {
  shareId: ID!
}

type GrantShareResult {
  data: GrantSharePayload
  errors: [ContractError!]
}

type MediaAsset implements Node {
  createdAt: DateTime!
  fileSizeBytes: Int
  height: Int
  id: ID!
  kind: MediaAssetKind!
  mimeType: String!
  status: MediaAssetStatus!
  updatedAt: DateTime!
  url: String!
  width: Int
}

enum MediaAssetKind {
  DISPLAY
  ORIGINAL
  THUMBNAIL
}

enum MediaAssetStatus {
  FAILED
  PENDING
  PROCESSING
  READY
}

type MediaItem implements Node {
  createdAt: DateTime!
  description: String
  durationSeconds: Int
  height: Int
  id: ID!
  kind: MediaKind!
  mimeType: String!
  originalFileName: String!
  shares: [ShareType]
  sizeBytes: Int!
  status: MediaItemStatus!
  tags: [String!]!
  takenAt: DateTime
  title: String
  updatedAt: DateTime!
  width: Int
}

input MediaItemCollectionInput {
  pageInfo: PageInfoInput!
  sortBy: MediaItemSortBy!
  sortDir: SortDir!
}

type MediaItemCollectionPayload {
  nodes: [MediaItem!]!
  pageInfo: PageInfo!
}

enum MediaItemSortBy {
  CREATED_AT @enumMeta(props: [{ name: "column", value: "created_at" }])
}

enum MediaItemStatus {
  DELETE_FAILED
  DELETE_PENDING
  FAILED
  PENDING
  PROCESSING
  READY
  UPLOADED
}

enum MediaKind {
  PHOTO
  VIDEO
}

type Mutation {
  AddMediaItemToAlbum(input: AddMediaItemToAlbumInput!): AddMediaItemToAlbumResponse!
  AddMediaItemsToAlbum(input: AddMediaItemsToAlbumInput!): AddMediaItemsToAlbumResponse!
  DeleteAlbumItemsFromAlbum(
    input: DeleteAlbumItemsFromAlbumInput!
  ): DeleteAlbumItemsFromAlbumResponse!
  ReorderAlbumItems(input: ReorderAlbumItemsInput!): ReorderAlbumItemsResponse!
  SetCoverMedia(input: SetCoverMediaInput!): SetCoverMediaResponse!
  UnsetCoverMedia(input: UnsetCoverMediaInput!): UnsetCoverMediaResponse!
  createAlbum(input: CreateAlbumInput!): CreateAlbumResponse!
  createMediaUpload(input: CreateMediaUploadInput!): CreateMediaUploadResponse!
  deleteAlbum(input: DeleteAlbumInput!): DeleteAlbumResponse!
  deleteMediaItem(input: DeleteMediaItemInput!): DeleteMediaItemResponse!
  deleteMediaItems(input: DeleteMediaItemsInput!): DeleteMediaItemsResponse!
  finalizeMediaUpload(input: FinalizeMediaUploadInput!): FinalizeMediaUploadResponse!
  grantAlbumShare(input: GrantAlbumShareInput!): GrantShareResult!
  grantMediaItemShare(input: GrantMediaItemShareInput!): GrantShareResult!
  updateMediaItemDetails(input: UpdateMediaItemDetailsInput!): UpdateMediaItemDetailsResponse!
  updateMediaItemTags(input: UpdateMediaItemTagsInput!): UpdateMediaItemTagsResponse!
}

input NewAlbumInAddMediaItemsInput {
  description: String
  title: String!
}

"""
Implemented by all entities that have an id.
"""
interface Node {
  id: ID!
}

"""
Cursor-free paging window (offset-based). Used on output types.
"""
type PageInfo {
  limit: Int!
  offset: Int!
}

"""
Same shape as PageInfo; GraphQL requires a distinct input type for fields on input objects.
"""
input PageInfoInput {
  limit: Int!
  offset: Int!
}

type Query {
  shareContacts(userId: String!): [ShareContactType]
  shareLink(token: String!): ShareLinkAccess
  viewer: Viewer
}

input ReorderAlbumItemsInput {
  albumId: ID!
  albumItemIds: [ID!]!
}

type ReorderAlbumItemsPayload {
  albumId: ID!
}

type ReorderAlbumItemsResponse {
  data: ReorderAlbumItemsPayload
  errors: [ContractError!]
}

input SetCoverMediaInput {
  albumId: ID!
  albumItemId: ID!
}

type SetCoverMediaPayload {
  albumId: ID!
}

type SetCoverMediaResponse {
  data: SetCoverMediaPayload
  errors: [ContractError!]
}

type ShareContactType {
  handle: String!
  userId: ID!
}

type ShareLinkAccess {
  target: ShareLinkTarget!
  token: ID!
  viewerRelationship: ShareViewerRelationship!
}

union ShareLinkTarget = SharedAlbum | SharedMediaItem

enum SharePermission {
  COMMENT
  DOWNLOAD
  VIEW
}

type ShareType {
  createdAt: DateTime!
  expiresAt: DateTime
  grantedToUserId: ID
  id: ID!
  label: String
  permission: SharePermission!
  revokedAt: DateTime
}

enum ShareViewerRelationship {
  ANONYMOUS
  AUTHENTICATED
  MEMBER
  OWNER
}

type SharedAlbum implements Node {
  id: ID!
  items(after: String, first: Int = 50): SharedAlbumItemConnection!
  title: String!
}

type SharedAlbumItem implements Node {
  id: ID!
  media: SharedMediaItem!
}

type SharedAlbumItemConnection {
  nodes: [SharedAlbumItem!]!
  pageInfo: PageInfo!
}

type SharedMediaItem implements Node {
  displayUrl: String!
  height: Int
  id: ID!
  width: Int
}

enum SortDir {
  ASC
  DESC
}

input UnsetCoverMediaInput {
  albumId: ID!
}

type UnsetCoverMediaPayload {
  albumId: ID!
}

type UnsetCoverMediaResponse {
  data: UnsetCoverMediaPayload
  errors: [ContractError!]
}

input UpdateMediaItemDetailsInput {
  description: String
  mediaItemId: ID!
  takenAt: DateTime
  title: String
}

type UpdateMediaItemDetailsPayload {
  description: String
  mediaItemId: ID!
  takenAt: DateTime
  title: String
}

type UpdateMediaItemDetailsResponse {
