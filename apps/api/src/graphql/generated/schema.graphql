schema {
  query: Query
  mutation: Mutation
}

directive @enumMeta(
  description: String
  display: String
  props: [EnumMetaPropInput!]
  shortDisplay: String
  sortOrder: Int
) on ENUM_VALUE

input AddMediaItemToAlbumInput {
  albumId: ID!
  mediaItemId: ID!
}

type AddMediaItemToAlbumPayload {
  albumId: ID!
  albumItemId: ID!
}

type AddMediaItemToAlbumResponse {
  data: AddMediaItemToAlbumPayload
  errors: [ContractError!]
}

input AddMediaItemsToAlbumInput {
  albumId: ID
  mediaItemIds: [ID!]!
  newAlbum: NewAlbumInAddMediaItemsInput
}

type AddMediaItemsToAlbumPayload {
  albumId: ID!
  albumItemIds: [ID!]!
}

type AddMediaItemsToAlbumResponse {
  data: AddMediaItemsToAlbumPayload
  errors: [ContractError!]
}

type Album implements Node {
  coverMedia: MediaItem
  createdAt: DateTime!
  id: ID!
  items(input: ViewerAlbumItemsInput!): AlbumItemCollectionPayload!
  shares: [ShareType]
  title: String!
  updatedAt: DateTime!
}

input AlbumCollectionInput {
  pageInfo: PageInfoInput!
  sortBy: AlbumSortBy!
  sortDir: SortDir!
}

type AlbumCollectionPayload {
  nodes: [Album!]!
  pageInfo: PageInfo!
}

type AlbumItem implements Node {
  createdAt: DateTime!
  id: ID!
  mediaItem: MediaItem!
  orderIndex: String!
  updatedAt: DateTime!
}

input AlbumItemCollectionInput {
  pageInfo: PageInfoInput!
  sortBy: AlbumItemSortBy!
  sortDir: SortDir!
}

type AlbumItemCollectionPayload {
  nodes: [AlbumItem!]!
  pageInfo: PageInfo!
}

enum AlbumItemSortBy {
  CREATED_AT @enumMeta(props: [{ name: "column", value: "created_at" }])
  ORDER_INDEX @enumMeta(props: [{ name: "column", value: "order_index" }])
}

enum AlbumSortBy {
  CREATED_AT @enumMeta(props: [{ name: "column", value: "created_at" }])
  TITLE @enumMeta(props: [{ name: "column", value: "title" }])
}

type ContractError {
  category: ErrorCategory!
  code: String!
  field: String
  message: String!
  retryable: Boolean!
}

input CreateAlbumInput {
  description: String
  title: String!
}

type CreateAlbumPayload {
  albumId: ID!
}

type CreateAlbumResponse {
  data: CreateAlbumPayload
  errors: [ContractError!]
}

input CreateMediaUploadInput {
  kind: MediaKind!
  mimeType: String!
  originalFileName: String
}

type CreateMediaUploadPayload {
  mediaItemId: ID!
  status: MediaItemStatus!
  uploadInstructions: UploadInstructions!
}

type CreateMediaUploadResponse {
  data: CreateMediaUploadPayload
  errors: [ContractError!]
}

scalar Date

scalar DateTime

input DeleteAlbumInput {
  albumId: ID!
}

input DeleteAlbumItemsFromAlbumInput {
  albumId: ID!
  albumItemIds: [ID!]!
}

type DeleteAlbumItemsFromAlbumPayload {
  albumId: ID!
  albumItemIds: [ID!]!
}

type DeleteAlbumItemsFromAlbumResponse {
