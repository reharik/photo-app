type Album implements ViewableItem & Node {
  id: ID!
  title: String!
  coverMedia: MediaItem
  # members: (input: ViewerAlbumItemsInput): AlbumItemCollectionPayload!
  createdAt: DateTime!
  updatedAt: DateTime!
  owner: Owner
  ownerFirstName: String
  ownerLastName: String
  items(input: ViewerAlbumItemsInput!): AlbumItemCollectionPayload!
  comments(input: CommentsInput!): CommentCollectionPayload!
  operations: [Operation!]!
  itemCount: Int!
}

type Owner {
  firstName: String
  lastName: String
}

input ViewerAlbumItemsInput {
  collectionInfo: AlbumItemCollectionInput!
}

input AlbumItemCollectionInput {
  pageInfo: PageInfoInput!
  sortBy: AlbumItemSortBy!
  sortDir: SortDir!
}

type AlbumItemCollectionPayload {
  nodes: [AlbumItem!]!
  totalCount: Int!
  pageInfo: PageInfo!
}

# YAGNI
# type AlbumMember implements Node {
#   id: ID!
#   role: AlbumMemberRole!
#   createdAt: DateTime!
#   updatedAt: DateTime!
# }

enum AlbumMemberRole {
  OWNER
  CONTRIBUTOR
  ADMIN
}

type AlbumItem implements ViewableItem & Node {
  id: ID!
  mediaItem: MediaItem!
  operations: [Operation!]!
  orderIndex: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum AlbumItemSortBy {
  TAKEN_AT
    @enumMeta(
      props: [
        { name: "column", value: "taken_at" }
        { name: "table", value: "media_item" }
        { name: "nullsLast", value: "true" }
      ]
    )
  CREATED_AT
    @enumMeta(
      props: [
        { name: "column", value: "created_at" }
        { name: "table", value: "album_item" }
        { name: "nullsLast", value: "false" }
      ]
    )
  ORDER_INDEX
    @enumMeta(
      props: [
        { name: "column", value: "order_index" }
        { name: "table", value: "album_item" }
        { name: "nullsLast", value: "false" }
      ]
    )
}
