type Mutation {
  createAlbum(input: CreateAlbumInput!): CreateAlbumResponse!
  AddMediaItemsToAlbum(input: AddMediaItemsToAlbumInput!): AddMediaItemsToAlbumResponse!
  ReorderAlbumItems(input: ReorderAlbumItemsInput!): ReorderAlbumItemsResponse!
  DeleteAlbumItemsFromAlbum(
    input: DeleteAlbumItemsFromAlbumInput!
  ): DeleteAlbumItemsFromAlbumResponse!
  SetCoverMedia(input: SetCoverMediaInput!): SetCoverMediaResponse!
  UnsetCoverMedia(input: UnsetCoverMediaInput!): UnsetCoverMediaResponse!
  grantUserAuthorizationForAlbum(
    input: GrantUserAuthorizationForAlbumInput!
  ): GrantUserAuthorizationResult!
}

input SetCoverMediaInput {
  albumId: ID!
  albumItemId: ID!
}

input UnsetCoverMediaInput {
  albumId: ID!
}
type SetCoverMediaResponse {
  data: SetCoverMediaPayload
  errors: [ContractError!]
}

type SetCoverMediaPayload {
  albumId: ID!
}

type UnsetCoverMediaResponse {
  data: UnsetCoverMediaPayload
  errors: [ContractError!]
}

type UnsetCoverMediaPayload {
  albumId: ID!
}
type CreateAlbumResponse {
  data: CreateAlbumPayload
  errors: [ContractError!]
}

type CreateAlbumPayload {
  albumId: ID!
}

input CreateAlbumInput {
  title: String!
  description: String
}

type AddMediaItemToAlbumResponse {
  data: AddMediaItemToAlbumPayload
  errors: [ContractError!]
}

type AddMediaItemToAlbumPayload {
  albumId: ID!
  albumItemId: ID!
}

input AddMediaItemToAlbumInput {
  albumId: ID!
  mediaItemId: ID!
}

input NewAlbumInAddMediaItemsInput {
  title: String!
  description: String
}

input AddMediaItemsToAlbumInput {
  mediaItemIds: [ID!]!
  albumId: ID
  newAlbum: NewAlbumInAddMediaItemsInput
}

type AddMediaItemsToAlbumResponse {
  data: AddMediaItemsToAlbumPayload
  errors: [ContractError!]
}

type AddMediaItemsToAlbumPayload {
  albumId: ID!
  albumItemIds: [ID!]!
}

input ReorderAlbumItemsInput {
  albumId: ID!
  albumItemIds: [ID!]!
}

type ReorderAlbumItemsResponse {
  data: ReorderAlbumItemsPayload
  errors: [ContractError!]
}

type ReorderAlbumItemsPayload {
  albumId: ID!
}

type DeleteAlbumItemsFromAlbumResponse {
  data: DeleteAlbumItemsFromAlbumPayload
  errors: [ContractError!]
}
type DeleteAlbumItemsFromAlbumPayload {
  albumId: ID!
  albumItemIds: [ID!]!
}

input DeleteAlbumItemsFromAlbumInput {
  albumId: ID!
  albumItemIds: [ID!]!
}
input GrantUserAuthorizationForAlbumInput {
  albumId: ID!
  operations: [Operation!]!
  grantedToHandle: String!
  label: String
  expiresAt: DateTime
}
