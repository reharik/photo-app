type Mutation {
  deleteAlbum(input: DeleteAlbumInput!): DeleteAlbumResponse!
  markSeen(targetType: EntityType!, targetId: ID!): MarkSeenPayload!
}

type DeleteAlbumResponse {
  data: DeleteAlbumPayload
  errors: [ContractError!]
}

type DeleteAlbumPayload {
  albumId: ID!
}

input DeleteAlbumInput {
  albumId: ID!
}

type MarkSeenResponse {
  data: MarkSeenPayload
  errors: [ContractError!]
}

type MarkSeenPayload {
  success: Boolean
}

# Activity kind written when unseen rows are created (insert/read side).
# markSeen keys on the EntityType target, not the kind — the two axes stay
# separate so this never gets conflated with "which entity".
enum UnseenActivityType {
  ITEM_ADDED
  ALBUM_SHARED
}
