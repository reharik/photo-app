type Query {
  viewer: Viewer
}

type Viewer {
  id: ID!
  firstName: String
  lastName: String
  displayName: String!
  albums(input: ViewerAlbumsInput!): AlbumCollectionPayload!
  album(id: ID!): Album
  mediaItem(id: ID!): MediaItem
  mediaItems(input: ViewerMediaItemsInput!): MediaItemCollectionPayload!
  deleteAlbum(input: DeleteAlbumInput!): DeleteAlbumResponse!
  sharedWithMeMediaItems(
    input: ViewerSharedWithMeMediaItemsInput!
  ): SharedWithMeMediaItemCollectionPayload!
  sharedWithMeAlbums(input: ViewerSharedWithMeAlbumsInput!): SharedWithMeAlbumCollectionPayload!
  shareContacts: [ShareContactType!]!
  inAppNotification: [InAppNotification!]!
}

type InAppNotification {
  id: ID!
  targetType: EntityType!
  targetId: ID!
  sourceType: EntityType!
  sourceId: ID!
  kind: InAppNotificationType!
  surface: ActivitySurface!
}

type DeleteAlbumResponse {
  data: DeleteAlbumPayload
  errors: [ContractError!]
}

type DeleteAlbumPayload {
  albumId: ID!
}

input DeleteAlbumInput {
  albumId: ID!
}

input ViewerAlbumsInput {
  collectionInfo: AlbumCollectionInput!
}

input ViewerMediaItemsInput {
  collectionInfo: MediaItemCollectionInput!
}

input ViewerSharedWithMeMediaItemsInput {
  collectionInfo: SharedWithMeMediaItemCollectionInput!
}

input ViewerSharedWithMeAlbumsInput {
  collectionInfo: SharedWithMeAlbumCollectionInput!
}

input AlbumCollectionInput {
  pageInfo: PageInfoInput!
  sortBy: AlbumSortBy!
  sortDir: SortDir!
}

input MediaItemCollectionInput {
  pageInfo: PageInfoInput!
  sortBy: MediaItemSortBy!
  sortDir: SortDir!
}

type MediaItemCollectionPayload {
  nodes: [MediaItem!]!
  totalCount: Int!
  pageInfo: PageInfo!
}

enum MediaItemSortBy {
  CREATED_AT
    @enumMeta(
      props: [
        { name: "column", value: "created_at" }
        { name: "table", value: "media_item" }
        { name: "nullsLast", value: "false" }
      ]
    )
  TAKEN_AT
    @enumMeta(
      props: [
        { name: "column", value: "taken_at" }
        { name: "table", value: "media_item" }
        { name: "nullsLast", value: "true" }
      ]
    )
}

type AlbumCollectionPayload {
  nodes: [Album!]!
  totalCount: Int!
  pageInfo: PageInfo!
}

enum AlbumSortBy {
  TITLE
    @enumMeta(
      props: [
        { name: "column", value: "title" }
        { name: "table", value: "album" }
        { name: "nullsLast", value: "true" }
      ]
    )
  CREATED_AT
    @enumMeta(
      props: [
        { name: "column", value: "created_at" }
        { name: "table", value: "album" }
        { name: "nullsLast", value: "false" }
      ]
    )
}
