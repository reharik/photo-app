scalar DateTime
scalar Date

"""
Optional metadata on enum values for SmartEnum / codegen (e.g. DB column names).
"""
input EnumMetaPropInput {
  name: String!
  value: String!
}

directive @enumMeta(
  display: String
  shortDisplay: String
  description: String
  sortOrder: Int
  props: [EnumMetaPropInput!]
) on ENUM_VALUE

"""
Implemented by all entities that have an id.
"""
interface Node {
  id: ID!
}

enum SortDir {
  ASC
  DESC
}

"""
Cursor-free paging window (offset-based). Used on output types.
"""
type PageInfo {
  limit: Int!
  offset: Int!
}

"""
Same shape as PageInfo; GraphQL requires a distinct input type for fields on input objects.
"""
input PageInfoInput {
  limit: Int!
  offset: Int!
}

type ContractError {
  code: String!
  message: String!
  field: String
  category: ErrorCategory!
  retryable: Boolean!
}

enum ErrorCategory {
  VALIDATION
  DOMAIN
  AUTH
  CONFLICT
  SYSTEM
  NETWORK
}

interface ViewableItem implements Node {
  id: ID!
  operations: [Operation!]!
}
