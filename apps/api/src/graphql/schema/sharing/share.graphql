enum SharePermission {
  VIEW
  DOWNLOAD
  COMMENT
}

type ShareType {
  id: ID!
  grantedToUserId: ID
  permission: SharePermission!
  label: String
  expiresAt: DateTime
  revokedAt: DateTime
  createdAt: DateTime!
}

type ShareContactType {
  userId: ID!
  handle: String!
}

type GrantShareResult {
  success: Boolean!
  token: String
  share: ShareType
  errors: [ContractError!]
}

type GrantManyMediaItemSharesResult {
  success: Boolean!
  token: String
  shares: [ShareType!]
  errors: [ContractError!]
}
