enum SharePermission {
  VIEW
  DOWNLOAD
  COMMENT
}

type AuthorizationType {
  id: ID!
  grantedToUserId: ID
  permissions: [SharePermission!]!
  label: String
  expiresAt: DateTime
  revokedAt: DateTime
  createdAt: DateTime!
}

type ShareContactType {
  userId: ID!
  handle: String!
}

type GrantUserAuthorizationResult {
  data: GrantUserAuthorizationPayload
  errors: [ContractError!]
}

type GrantUserAuthorizationPayload {
  authorizationIds: [ID!]!
  authorizations: [AuthorizationType!]!
}
