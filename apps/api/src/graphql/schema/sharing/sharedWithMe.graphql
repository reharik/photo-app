type SharedWithMeMediaItemType implements Node {
  id: ID!
  sharedAt: DateTime!
  sharedBy: ID!
  mediaItem: MediaItem!
  sharedByFirstName: String!
  sharedByLastName: String!
}

type SharedWithMeMediaAlbumType implements Node {
  id: ID!
  sharedAt: DateTime!
  sharedBy: ID!
  sharedByFirstName: String!
  sharedByLastName: String!
  album: Album!
}

input SharedWithMeMediaItemCollectionInput {
  pageInfo: PageInfoInput!
  sortBy: SharedWithMeMediaItemSortBy!
  sortDir: SortDir!
}

type SharedWithMeMediaItemCollectionPayload {
  nodes: [SharedWithMeMediaItemType!]!
  totalCount: Int!
  pageInfo: PageInfo!
}

enum SharedWithMeMediaItemSortBy {
  SHARED_AT
    @enumMeta(
      props: [
        { name: "column", value: "created_at" }
        { name: "table", value: "access_grant" }
        { name: "nullsLast", value: "true" }
      ]
    )
}

input SharedWithMeAlbumCollectionInput {
  pageInfo: PageInfoInput!
  sortBy: SharedWithMeAlbumSortBy!
  sortDir: SortDir!
}

type SharedWithMeAlbumCollectionPayload {
  nodes: [SharedWithMeMediaAlbumType!]!
  totalCount: Int!
  pageInfo: PageInfo!
}

enum SharedWithMeAlbumSortBy {
  SHARED_AT
    @enumMeta(
      props: [
        { name: "column", value: "created_at" }
        { name: "table", value: "access_grant" }
        { name: "nullsLast", value: "true" }
      ]
    )
}
