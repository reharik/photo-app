type PublicMediaItem implements Node {
  id: ID!
  kind: MediaKind!
  status: MediaItemStatus!
  title: String
  mimeType: String!
  width: Int
  height: Int
  durationSeconds: Int
  tags: [String!]!
  comments(input: CommentsInput!): CommentCollectionPayload!
  viewerOperations: [ViewerOperation!]!
  reactionCounts: ReactionCounts!
}
