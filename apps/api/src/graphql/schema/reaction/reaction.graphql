enum ReactionEmoji {
  HEART
  COMMENT
}

type ReactionCounts {
  total: Int! # sum across all emoji
  byEmoji: [ReactionDetails!]! # detailed breakdown
}

type Reactor {
  firstName: String
  lastName: String
  userId: ID!
  isViewer: Boolean!
}

type ReactionDetails {
  emoji: ReactionEmoji!
  count: Int!
  reactors: [Reactor!]!
}

type ViewerReaction {
  emoji: ReactionEmoji!
  id: ID!
}
