type Mutation {
  createMediaUpload(input: CreateMediaUploadInput!): CreateMediaUploadResponse!
  finalizeMediaUpload(input: FinalizeMediaUploadInput!): FinalizeMediaUploadResponse!
  deleteMediaItem(input: DeleteMediaItemInput!): DeleteMediaItemResponse!
  deleteMediaItems(input: DeleteMediaItemsInput!): DeleteMediaItemsResponse!
  updateMediaItemDetails(input: UpdateMediaItemDetailsInput!): UpdateMediaItemDetailsResponse!
  updateMediaItemTags(input: UpdateMediaItemTagsInput!): UpdateMediaItemTagsResponse!
  grantUserAuthorizationsForMediaItems(
    input: GrantUserAuthorizationsForMediaItemsInput!
  ): GrantUserAuthorizationResult!
}

input CreateMediaUploadInput {
  kind: MediaKind!
  mimeType: String!
  originalFileName: String
  albumId: ID
}

type UploadHeader {
  key: String!
  value: String!
}

type UploadInstructions {
  method: String!
  url: String!
  headers: [UploadHeader!]!
}

input DeleteMediaItemInput {
  mediaItemId: ID!
}

input DeleteMediaItemsInput {
  mediaItemIds: [ID!]!
}

input UpdateMediaItemDetailsInput {
  mediaItemId: ID!
  title: String
  description: String
  takenAt: DateTime
}

input UpdateMediaItemTagsInput {
  mediaItemId: ID!
  tags: [TagInput!]!
}

input TagInput {
  label: String!
  userTagId: ID
}

type DeleteMediaItemResponse {
  data: DeleteMediaItemPayload
  errors: [ContractError!]
}

type DeleteMediaItemPayload {
  mediaItemId: ID!
}

type DeleteMediaItemsResponse {
  data: DeleteMediaItemsPayload
  errors: [ContractError!]
}

type DeleteMediaItemsPayload {
  deletedMediaItemIds: [ID!]!
}

type UpdateMediaItemDetailsResponse {
  data: UpdateMediaItemDetailsPayload
  errors: [ContractError!]
}

type UpdateMediaItemDetailsPayload {
  mediaItemId: ID!
  title: String
  description: String
  takenAt: DateTime
}

type UpdateMediaItemTagsResponse {
  data: UpdateMediaItemTagsPayload
  errors: [ContractError!]
}

type UpdateMediaItemTagsPayload {
  mediaItemId: ID!
}

type CreateMediaUploadResponse {
  data: CreateMediaUploadPayload
  errors: [ContractError!]
}

type CreateMediaUploadPayload {
  mediaItemId: ID!
  status: MediaItemStatus!
  uploadInstructions: UploadInstructions!
}

input FinalizeMediaUploadInput {
  mediaItemId: ID!
}

type FinalizeMediaUploadResponse {
  data: FinalizeMediaUploadPayload
  errors: [ContractError!]
}

type FinalizeMediaUploadPayload {
  mediaItemId: ID!
  status: MediaItemStatus!
  mimeType: String
  size: Int!
  kind: MediaKind!
}

input GrantUserAuthorizationsForMediaItemsInput {
  mediaItemIds: [ID!]!
  operations: [Operation!]!
  grantedToUserId: ID
  grantedToHandle: String
  label: String
  expiresAt: DateTime
}
