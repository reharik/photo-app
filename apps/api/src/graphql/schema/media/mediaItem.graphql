type MediaItem implements ViewableItem & Node {
  id: ID!
  kind: MediaKind!
  status: MediaItemStatus!
  mimeType: String!
  sizeBytes: Int!
  originalFileName: String!
  width: Int
  height: Int
  durationSeconds: Int
  title: String
  description: String
  takenAt: DateTime
  tags: [Tag!]!
  createdAt: DateTime!
  updatedAt: DateTime!
  authorizations: [AuthorizationType]
  operations: [Operation!]!
  comments(input: CommentsInput!): CommentCollectionPayload!
  reactionCounts: ReactionCounts!
  viewerReactions: [ViewerReaction!]
  takenAtUtcOffsetMinutes: Int
}

type Tag {
  id: ID!
  label: String!
  userTagId: ID
}

enum Operation {
  GRANT_ALBUM_AUTHORIZATION
  GRANT_MEDIA_ITEM_ALBUM_AUTHORIZATION
  EDIT_DETAILS
  ADD_ITEMS
  REMOVE_ITEMS
  EDIT_COVER
  DELETE_ALBUM
  DOWNLOAD
  COMMENT
  DELETE_MEDIA_ITEM
  EDIT_MEDIA_ITEM
}

enum MediaKind {
  PHOTO
  VIDEO
}

enum MediaItemStatus {
  PENDING
  UPLOADED
  PROCESSING
  READY
  FAILED
  DELETE_PENDING
  DELETE_FAILED
}
