type MediaItem implements ViewableItem & Node {
  id: ID!
  kind: MediaKind!
  status: MediaItemStatus!
  mimeType: String!
  sizeBytes: Int!
  originalFileName: String!
  width: Int
  height: Int
  durationSeconds: Int
  title: String
  description: String
  takenAt: DateTime
  tags: [String!]!
  createdAt: DateTime!
  updatedAt: DateTime!
  authorizations: [AuthorizationType]
  operations: [Operation!]!
  comments(input: CommentsInput!): CommentCollectionPayload!
  reactionCounts: ReactionCounts!
  viewerReactions: [ViewerReaction!]
}

enum Operation {
  GRANT_AUTHORIZATION
  EDIT_DETAILS
  ADD_ITEMS
  REMOVE_ITEMS
  EDIT_COVER
  DELETE_ALBUM
  DOWNLOAD
  COMMENT
}

enum MediaKind {
  PHOTO
  VIDEO
}

enum MediaItemStatus {
  PENDING
  UPLOADED
  PROCESSING
  READY
  FAILED
  DELETE_PENDING
  DELETE_FAILED
}
