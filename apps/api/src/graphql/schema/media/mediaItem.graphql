type MediaItem implements Node {
  id: ID!
  kind: MediaKind!
  status: MediaItemStatus!
  """
  Thumbnail and display object URLs derived from storage keys (no media_asset reads).
  """
  derivedUrls: MediaItemDerivedUrls!
  mimeType: String!
  sizeBytes: Int!
  originalFileName: String!
  width: Int
  height: Int
  durationSeconds: Int
  title: String
  description: String
  takenAt: DateTime
  tags: [String!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum MediaKind {
  PHOTO
  VIDEO
}

enum MediaItemStatus {
  PENDING
  UPLOADED
  PROCESSING
  READY
  FAILED
  DELETE_PENDING
  DELETE_FAILED
}

type MediaItemDerivedUrls {
  thumbnail: String!
  display: String!
}
