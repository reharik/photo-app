type MediaItem implements ViewableItem & Node {
  id: ID!
  kind: MediaKind!
  status: MediaItemStatus!
  mimeType: String!
  sizeBytes: Int!
  originalFileName: String!
  width: Int
  height: Int
  durationSeconds: Int
  title: String
  description: String
  takenAt: DateTime
  tags: [String!]!
  createdAt: DateTime!
  updatedAt: DateTime!
  authorizations: [AuthorizationType]
  viewerOperations: [ViewerOperation!]!
  viewerIsOwner: Boolean!
}

enum ViewerOperation {
  GRANT_AUTHORIZATION
  EDIT_DETAILS
  ADD_ITEMS
  REMOVE_ITEMS
  EDIT_COVER
  DELETE_ALBUM
  DOWNLOAD
}

enum MediaKind {
  PHOTO
  VIDEO
}

enum MediaItemStatus {
  PENDING
  UPLOADED
  PROCESSING
  READY
  FAILED
  DELETE_PENDING
  DELETE_FAILED
}
