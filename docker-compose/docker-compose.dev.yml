services:
  # Infra dev base includes LocalStack; keep it opt-in so default `make docker/dev/up` uses real AWS (~/.aws).
  localstack:
    profiles:
      - localstack

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: dev
      args:
        APP_NAME: api
    ports:
      - '3001:3001'
    env_file:
      - ./apps/api/.env
    # Override .env so container talks to db service on internal port (5432), not host-mapped 5433
    depends_on: !override
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      API_PORT: '3001'
      # Clear infra dev.yml LocalStack URL when LocalStack is not running (see localstack profile above).
      AWS_ENDPOINT: ''
    volumes:
      - ./apps/api:/app/apps/api
      - /app/apps/api/node_modules
      - ./packages:/app/packages
      - ~/.aws:/root/.aws:ro
    # Override default dev CMD; keep APP_WORKSPACE_PATH in sync with build.args above and volume mount.
    command: ['sh', '-c', 'sh apps/api/src/scripts/serverStartUpDev.sh']

  media-worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: dev
      args:
        APP_NAME: media-worker
    env_file:
      - ./apps/media-worker/.env
    depends_on: !override
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      AWS_ENDPOINT: ''
    volumes:
      - ./apps/media-worker:/app/apps/media-worker
      - /app/apps/media-worker/node_modules
      - ./packages:/app/packages
      - ~/.aws:/root/.aws:ro
    command: ['sh', '-c', 'sh apps/media-worker/src/scripts/serverStartUpDev.sh']

  db:
    # Replace default 5432:5432 so we don't conflict with another Postgres (e.g. network app)
    ports: !override
      - '5433:5432'
    env_file:
      - ./apps/api/.env
